<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat</title>
    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

    <style>
        :root { --bg: #0f172a; --chat-bg: #1e293b; --my-msg: #3b82f6; --other-msg: #334155; --text: #f8fafc; --accent: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100dvh; width: 100vw; overflow: hidden; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; }
        
        /* Auth Screen */
        #auth-screen { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        .auth-btn { background: var(--my-msg); color: white; border: none; padding: 15px 30px; border-radius: 20px; font-size: 18px; cursor: pointer; width: 200px; font-weight: bold; }
        
        /* Chat Layout */
        #chat-screen { display: none; flex-direction: column; height: 100%; max-width: 800px; margin: 0 auto; background: var(--chat-bg); position: relative; }
        header { background: #0b1120; padding: 10px 15px; display: flex; flex-direction: column; align-items: center; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .status-bar { font-size: 12px; color: #94a3b8; margin-top: 2px; height: 15px; }
        
        /* Messages Area */
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 80%; cursor: pointer; }
        .msg-wrapper.me { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.other { align-self: flex-start; align-items: flex-start; }
        
        .msg-sender { font-size: 11px; color: #94a3b8; margin-bottom: 3px; margin-left: 5px; }
        .msg { padding: 10px 14px; border-radius: 18px; position: relative; word-break: break-word; line-height: 1.4; }
        .me .msg { background: var(--my-msg); border-bottom-right-radius: 4px; }
        .other .msg { background: var(--other-msg); border-bottom-left-radius: 4px; }
        .bot-msg .msg { background: #7c3aed; }
        
        /* Media in Messages */
        .msg img, .msg video { max-width: 100%; border-radius: 10px; margin-top: 5px; }
        .msg-video-circle { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .msg-audio { width: 220px; height: 40px; outline: none; }
        
        /* Reply UI */
        .reply-box { background: rgba(0,0,0,0.2); border-left: 3px solid var(--accent); padding: 5px 8px; border-radius: 4px; font-size: 12px; margin-bottom: 5px; opacity: 0.9; }
        #reply-preview { display: none; background: #0f172a; padding: 10px; border-top: 1px solid #334155; font-size: 13px; align-items: center; justify-content: space-between; }
        #reply-close { background: none; border: none; color: #ef4444; font-size: 20px; cursor: pointer; }
        
        /* Input Area */
        #input-area { background: #0b1120; padding: 10px; display: flex; gap: 8px; align-items: center; z-index: 10; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        #emoji-btn, #attach-btn, .action-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #94a3b8; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; }
        #msg-input { flex: 1; background: #1e293b; border: none; color: white; padding: 12px 15px; border-radius: 20px; font-size: 16px; outline: none; max-height: 100px; resize: none; overflow-y: auto; }
        .action-btn { background: var(--my-msg); color: white; border-radius: 50%; }
        .action-btn.recording { animation: pulse 1s infinite alternate; background: #ef4444; }
        
        /* Emoji Panel */
        #emoji-panel { display: none; background: #1e293b; border-top: 1px solid #334155; padding: 10px; flex-wrap: wrap; gap: 10px; max-height: 200px; overflow-y: auto; }
        .emoji { font-size: 24px; cursor: pointer; user-select: none; }
        
        /* System & Uploads */
        .system-msg { align-self: center; font-size: 12px; color: #94a3b8; background: rgba(0,0,0,0.2); padding: 4px 10px; border-radius: 10px; margin: 5px 0; }
        #progress-bar { height: 3px; background: var(--accent); width: 0%; transition: width 0.3s; position: absolute; top: 0; left: 0; }
        
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); box-shadow: 0 0 15px #ef4444; } }
        
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body>

    <!-- Auth Screen -->
    <div id="auth-screen">
        <h2>Кто ты сегодня?</h2>
        <button class="auth-btn" onclick="login('Я (Владелец)')">Я (Владелец)</button>
        <button class="auth-btn" onclick="login('Друг 1')">Друг 1</button>
        <button class="auth-btn" onclick="login('Друг 2')">Друг 2</button>
    </div>

    <!-- Chat Screen -->
    <div id="chat-screen">
        <div id="progress-bar"></div>
        <header>
            <div id="header-title">Чат 🚀</div>
            <div class="status-bar" id="typing-status">В сети: 1</div>
        </header>

        <div id="messages"></div>

        <div id="emoji-panel"></div>

        <div id="reply-preview">
            <div><b id="reply-name"></b>: <span id="reply-text"></span></div>
            <button id="reply-close" onclick="cancelReply()">×</button>
        </div>

        <div id="input-area">
            <button id="emoji-btn" onclick="toggleEmoji()">😀</button>
            <input type="file" id="file-input" hidden onchange="handleFileUpload(event)">
            <button id="attach-btn" onclick="document.getElementById('file-input').click()">📎</button>
            <input type="text" id="msg-input" placeholder="Сообщение..." autocomplete="off">
            <button class="action-btn" id="send-btn" onclick="handleMainAction()">🎤</button>
        </div>
    </div>

    <script>
        // Конфиг Firebase
        const firebaseConfig = { 
          apiKey: "AIzaSyCJY8vOoQDkR2rW_AEG0iddY2sEFhh9OWw", 
          authDomain: "telespam-141ed.firebaseapp.com", 
          databaseURL: "https://telespam-141ed-default-rtdb.firebaseio.com",
          projectId: "telespam-141ed", 
          storageBucket: "telespam-141ed.firebasestorage.app", 
          messagingSenderId: "207543173024", 
          appId: "1:207543173024:web:50881a0f2aa674a7652ec5", 
          measurementId: "G-17J19TZ775" 
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        // State variables
        let currentUser = localStorage.getItem('chatUser') || null;
        let replyingTo = null;
        let isRecording = false;
        let mediaRecorder;
        let audioChunks = [];
        let recordMode = 'audio';
        let typingTimeout;
        const emojis = ["😂","🥺","😍","🔥","👍","😎","🗿","🤡","🤬","🎉","❤️","💀","👀","🤷‍♂️","🤦‍♂️"];

        // UI Elements
        const authScreen = document.getElementById('auth-screen');
        const chatScreen = document.getElementById('chat-screen');
        const messagesDiv = document.getElementById('messages');
        const msgInput = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');
        const typingStatus = document.getElementById('typing-status');
        const progressBar = document.getElementById('progress-bar');
        
        // Звуки (Web Audio API)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if(type === 'send') { osc.frequency.setValueAtTime(300, audioCtx.currentTime); gain.gain.setValueAtTime(0.05, audioCtx.currentTime); }
            else { osc.frequency.setValueAtTime(500, audioCtx.currentTime); gain.gain.setValueAtTime(0.05, audioCtx.currentTime); }
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        }

        // Init
        if (currentUser) initChat();

        function login(name) {
            currentUser = name;
            localStorage.setItem('chatUser', name);
            initChat();
        }

        function initChat() {
            authScreen.style.display = 'none';
            chatScreen.style.display = 'flex';
            
            document.getElementById('emoji-panel').innerHTML = emojis.map(e => `<span class="emoji" onclick="addEmoji('${e}')">${e}</span>`).join('');

            const myStatusRef = db.ref('presence/' + currentUser);
            db.ref('.info/connected').on('value', snap => {
                if(snap.val()) {
                    myStatusRef.set(true);
                    myStatusRef.onDisconnect().remove();
                }
            });

            db.ref('messages').limitToLast(50).on('child_added', snapshot => renderMessage(snapshot.key, snapshot.val()));
            db.ref('typing').on('value', snap => {
                const typers = [];
                snap.forEach(child => { if(child.key !== currentUser && child.val()) typers.push(child.key); });
                typingStatus.innerText = typers.length ? `${typers.join(', ')} печатает...` : 'В сети';
            });

            msgInput.addEventListener('input', () => {
                const val = msgInput.value.trim();
                db.ref('typing/' + currentUser).set(val.length > 0);
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => db.ref('typing/' + currentUser).set(false), 2000);
                
                if(val.length > 0) { sendBtn.innerText = '➤'; sendBtn.style.background = 'var(--my-msg)'; recordMode = 'text'; }
                else if(recordMode === 'text') { toggleRecordMode('audio'); }
            });
        }

        function handleMainAction() {
            const text = msgInput.value.trim();
            if (text.length > 0) {
                sendMessage({ type: 'text', text: text, sender: currentUser, replyTo: replyingTo });
                msgInput.value = '';
                db.ref('typing/' + currentUser).set(false);
                toggleRecordMode('audio');
                cancelReply();
                checkTrollBot(text);
            } else {
                if(!isRecording) toggleRecordMode(recordMode === 'audio' ? 'video' : 'audio');
                toggleRecording();
            }
        }

        function toggleRecordMode(mode) {
            recordMode = mode;
            sendBtn.innerText = mode === 'audio' ? '🎤' : mode === 'video' ? '⭕' : '➤';
            sendBtn.style.background = mode === 'video' ? '#8b5cf6' : 'var(--my-msg)';
        }

        function toggleEmoji() {
            const p = document.getElementById('emoji-panel');
            p.style.display = p.style.display === 'flex' ? 'none' : 'flex';
        }
        function addEmoji(e) { msgInput.value += e; }

        function sendMessage(data) {
            data.timestamp = Date.now();
            db.ref('messages').push(data);
            playSound('send');
        }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if(!file) return;
            const type = file.type.startsWith('image/') ? 'image' : 'file';
            uploadToStorage(file, type);
        }

        function uploadToStorage(blob, type) {
            const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}`;
            const task = storage.ref(`chat_media/${fileName}`).put(blob);
            
            task.on('state_changed', 
                snap => progressBar.style.width = `${(snap.bytesTransferred / snap.totalBytes) * 100}%`,
                err => { progressBar.style.width = '0'; alert('Ошибка загрузки!'); },
                async () => {
                    progressBar.style.width = '0';
                    const url = await task.snapshot.ref.getDownloadURL();
                    sendMessage({ type, url, sender: currentUser, replyTo: replyingTo });
                    cancelReply();
                }
            );
        }

        async function toggleRecording() {
            if (isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                sendBtn.classList.remove('recording');
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: true, 
                    video: recordMode === 'video' ? { facingMode: 'user', aspectRatio: 1 } : false 
                });
                
                audioChunks = [];
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: recordMode === 'video' ? 'video/webm' : 'audio/webm' });
                    uploadToStorage(blob, recordMode);
                    stream.getTracks().forEach(t => t.stop());
                };
                
                mediaRecorder.start();
                isRecording = true;
                sendBtn.classList.add('recording');
            } catch (err) {
                alert('Нет доступа к камере или микрофону');
            }
        }

        const trollJokes = ["А минусы будут? 🗿", "Лол, ну ты выдал 😂", "Сам понял что сказал?", "Осуждаю.", "Ахахахах", "🤖 Бип-боп, я слежу за тобой."];
        function checkTrollBot(text) {
            const t = text.toLowerCase();
            const shouldReply = Math.random() < 0.1 || t.includes('бот') || t.includes('тупой') || t.includes('помоги');
            if(shouldReply) {
                setTimeout(() => {
                    db.ref('messages').push({
                        sender: '🤖 Бот-Шутник',
                        type: 'text',
                        text: trollJokes[Math.floor(Math.random() * trollJokes.length)],
                        timestamp: Date.now()
                    });
                    playSound('receive');
                }, 1500 + Math.random() * 1000);
            }
        }

        function renderMessage(key, msg) {
            const isMe = msg.sender === currentUser;
            if(!isMe && msg.sender !== '🤖 Бот-Шутник' && Date.now() - msg.timestamp < 5000) playSound('receive');
            
            const wrap = document.createElement('div');
            wrap.className = `msg-wrapper ${isMe ? 'me' : 'other'} ${msg.sender.includes('Бот') ? 'bot-msg' : ''}`;
            wrap.onclick = () => setReply(msg, key);
            
            let contentHtml = '';
            const safeText = document.createElement('span');
            safeText.innerText = msg.text || '';

            if(msg.replyTo) {
                contentHtml += `<div class="reply-box"><b>${msg.replyTo.sender}</b>: ${msg.replyTo.text || 'Медиа'}</div>`;
            }

            if(msg.type === 'image') contentHtml += `<img src="${msg.url}" loading="lazy">`;
            else if(msg.type === 'audio') contentHtml += `<audio src="${msg.url}" controls class="msg-audio"></audio>`;
            else if(msg.type === 'video') contentHtml += `<video src="${msg.url}" autoplay loop muted class="msg-video-circle" onclick="this.muted=!this.muted"></video>`;
            
            wrap.innerHTML = `<div class="msg-sender">${msg.sender}</div><div class="msg">${contentHtml}</div>`;
            
            if(msg.type === 'text' || msg.text) {
                wrap.querySelector('.msg').appendChild(safeText);
            }
            
            messagesDiv.appendChild(wrap);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function setReply(msg, key) {
            replyingTo = { id: key, sender: msg.sender, text: msg.text ? msg.text.substring(0, 30) : 'Медиа сообщение' };
            document.getElementById('reply-preview').style.display = 'flex';
            document.getElementById('reply-name').innerText = replyingTo.sender;
            document.getElementById('reply-text').innerText = replyingTo.text;
            msgInput.focus();
        }

        function cancelReply() {
            replyingTo = null;
            document.getElementById('reply-preview').style.display = 'none';
        }
    </script>
</body>
</html>
