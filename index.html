<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Секретный TG</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; position: fixed; overflow: hidden; background: #0f172a; color: #fff; }
    
    @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-50px) scale(1.5); } }

    .screen { display: none; flex-direction: column; width: 100%; height: 100%; position: absolute; top: 0; left: 0; background: #0f172a; }
    .screen.active { display: flex; }

    #loginScreen { align-items: center; justify-content: center; padding: 20px; z-index: 100; }
    .login-card { padding: 30px 20px; text-align: center; width: 100%; max-width: 350px; background: #1e293b; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    select, input, button { width: 100%; padding: 14px; margin-top: 12px; border-radius: 10px; border: none; font-size: 16px; outline: none; }
    select, input { background: #334155; color: #fff; }
    .btn-primary { background: #3b82f6; color: #fff; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-primary:active { transform: scale(0.98); background: #2563eb; }

    header { background: #1e293b; padding: 12px 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #334155; flex-shrink: 0; z-index: 10; }
    .back-btn { font-size: 24px; cursor: pointer; color: #3b82f6; }
    .header-info { flex: 1; }
    .header-info h2 { font-size: 18px; display: flex; align-items: center; gap: 5px; }
    .status-text { font-size: 12px; color: #10b981; margin-top: 2px; height: 14px; }
    .header-actions { display: flex; gap: 15px; font-size: 22px; cursor: pointer; }

    .chat-list { flex: 1; overflow-y: auto; padding-top: 10px; }
    .chat-item { display: flex; align-items: center; gap: 15px; padding: 12px 15px; border-bottom: 1px solid #1e293b; cursor: pointer; transition: 0.2s; }
    .chat-item:active { background: #1e293b; }
    .avatar { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, #3b82f6, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .chat-info { flex: 1; overflow: hidden; }
    .chat-title { font-weight: bold; font-size: 16px; margin-bottom: 4px; }
    .chat-last-msg { font-size: 14px; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth; }
    .msg { max-width: 85%; padding: 8px 12px; border-radius: 14px; font-size: 15px; line-height: 1.4; animation: slideUp 0.2s ease forwards; position: relative; word-break: break-word; cursor: pointer; }
    .msg.my { align-self: flex-end; background: #2563eb; border-bottom-right-radius: 4px; }
    .msg.other { align-self: flex-start; background: #334155; border-bottom-left-radius: 4px; }
    .author { font-size: 12px; color: #93c5fd; font-weight: bold; margin-bottom: 4px; }
    .time { font-size: 10px; color: #cbd5e1; float: right; margin: 6px 0 -4px 10px; }
    
    .msg img { max-width: 100%; border-radius: 8px; margin-top: 4px; display: block; cursor: pointer; }
    .msg audio { width: 220px; height: 36px; margin-top: 4px; outline: none; }
    .msg video { width: 180px; height: 180px; border-radius: 50%; object-fit: cover; margin-top: 4px; border: 2px solid #3b82f6; cursor: pointer; }
    
    .reply-block { background: rgba(0,0,0,0.2); border-left: 3px solid #60a5fa; padding: 4px 8px; margin-bottom: 5px; border-radius: 4px; font-size: 13px; }
    .gift-msg { text-align: center; font-size: 40px; padding: 10px; background: none !important; }
    
    #reply-preview { display: none; background: #1e293b; padding: 8px 15px; border-left: 3px solid #3b82f6; font-size: 13px; justify-content: space-between; align-items: center; border-top: 1px solid #334155; }
    #emoji-bar { background: #1e293b; padding: 8px 15px; display: flex; gap: 15px; overflow-x: auto; border-top: 1px solid #334155; }
    .emoji-btn { background: none; border: none; font-size: 22px; cursor: pointer; flex-shrink: 0; }
    footer { background: #1e293b; padding: 10px 15px 15px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .icon-btn { background: none; border: none; font-size: 22px; color: #94a3b8; cursor: pointer; padding: 5px; }
    #msg-input { flex: 1; background: #334155; color: #fff; border: none; padding: 12px 15px; border-radius: 20px; font-size: 16px; outline: none; }
    .action-btn { background: #3b82f6; color: #fff; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    .action-btn.recording { background: #ef4444; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

    .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; flex-direction: column; justify-content: flex-end; }
    .modal-content { background: #1e293b; border-top-left-radius: 20px; border-top-right-radius: 20px; padding: 20px; max-height: 80vh; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; font-size: 20px; font-weight: bold; }
    
    .stars-balance { color: #fbbf24; font-weight: bold; }
    .gifts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .gift-item { background: #334155; border-radius: 12px; padding: 15px 5px; text-align: center; cursor: pointer; transition: 0.1s; }
    .gift-item:active { transform: scale(0.95); }
    .gift-icon { font-size: 35px; margin-bottom: 5px; }
    .gift-price { font-size: 12px; color: #fbbf24; font-weight: bold; margin-top: 5px; }

    .tap-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; padding: 50px 0; }
    .lehcoin { width: 200px; height: 200px; background: linear-gradient(135deg, #f59e0b, #d97706); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 80px; font-weight: bold; box-shadow: 0 10px 30px rgba(245, 158, 11, 0.5), inset 0 5px 15px rgba(255,255,255,0.4); cursor: pointer; transition: 0.05s; user-select: none; }
    .lehcoin:active { transform: scale(0.95); }
    .floating-text { position: absolute; font-size: 24px; color: #10b981; font-weight: bold; pointer-events: none; animation: floatUp 0.8s ease-out forwards; }
  </style>
</head>
<body>

  <!-- 1. ЭКРАН ВХОДА С ТВОИМ МЕНЮ (ПОЯВЛЯЕТСЯ ПЕРВЫМ) -->
  <div id="loginScreen" class="screen active">
    <div class="login-card">
      <div style="font-size: 50px; margin-bottom: 10px;">✈️</div>
      <h2>Кто ты?</h2>
      <select id="usernameInput">
        <option value="Я">Я</option>
        <option value="Друг 1">Друг 1</option>
        <option value="Друг 2">Друг 2</option>
        <option value="Друг 3">Друг 3</option>
      </select>
      <button class="btn-primary" onclick="enterChat()">Войти в чат</button>
    </div>
  </div>

  <!-- 2. СПИСОК ЧАТОВ -->
  <div id="chatListScreen" class="screen">
    <header>
      <div class="header-info">
        <h2>Чаты</h2>
        <div class="status-text">Онлайн</div>
      </div>
      <div class="header-actions">
        <span onclick="ui.showShop()">🎁</span>
        <span onclick="ui.showMiner()">⛏️</span>
      </div>
    </header>
    <div class="chat-list">
      <div class="chat-item" onclick="app.openChat('main')">
        <div class="avatar" style="background: linear-gradient(135deg, #ec4899, #f43f5e);">🚀</div>
        <div class="chat-info">
          <div class="chat-title">Чат с пацанами 🚀</div>
          <div class="chat-last-msg" id="main-last-msg">Загрузка...</div>
        </div>
      </div>
      <div class="chat-item" onclick="app.openChat('bot')">
        <div class="avatar" style="background: linear-gradient(135deg, #10b981, #059669);">🤖</div>
        <div class="chat-info">
          <div class="chat-title">Нейрохамам</div>
          <div class="chat-last-msg">Токсичный ИИ</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 3. ОКНО ЧАТА -->
  <div id="chatScreen" class="screen">
    <header>
      <div class="back-btn" onclick="ui.showScreen('chatListScreen')">‹</div>
      <div class="header-info">
        <h2 id="chat-header-title">Чат с пацанами 🚀</h2>
        <div class="status-text" id="typing-indicator"></div>
      </div>
    </header>

    <div id="messages"></div>

    <div id="reply-preview">
      <div>Ответ: <b id="reply-author"></b><br><span id="reply-text"></span></div>
      <b style="cursor:pointer; padding: 5px;" onclick="chat.cancelReply()">✕</b>
    </div>

    <div id="emoji-bar">
      <button class="emoji-btn" onclick="chat.addEmoji('👍')">👍</button>
      <button class="emoji-btn" onclick="chat.addEmoji('😂')">😂</button>
      <button class="emoji-btn" onclick="chat.addEmoji('🔥')">🔥</button>
      <button class="emoji-btn" onclick="chat.addEmoji('❤️')">❤️</button>
      <button class="emoji-btn" onclick="chat.addEmoji('😎')">😎</button>
      <button class="emoji-btn" onclick="chat.addEmoji('😡')">😡</button>
      <button class="emoji-btn" onclick="chat.addEmoji('🗿')">🗿</button>
      <button class="emoji-btn" onclick="chat.addEmoji('🤡')">🤡</button>
    </div>

    <footer>
      <label class="icon-btn">📎<input type="file" style="display:none;" onchange="media.uploadFile(event)"></label>
      <input type="text" id="msg-input" placeholder="Сообщение..." oninput="chat.checkInput()" onkeypress="if(event.key==='Enter') chat.sendText()">
      <button class="action-btn" id="video-btn" onclick="media.toggleVideoMode()" style="background: #334155; font-size: 14px;">📹</button>
      <button class="action-btn" id="mic-btn" onmousedown="media.startRecord()" onmouseup="media.stopRecord()" ontouchstart="media.startRecord()" ontouchend="media.stopRecord()">🎤</button>
    </footer>
  </div>

  <!-- 4. МАГАЗИН ПОДАРКОВ -->
  <div id="shop-modal" class="modal" onclick="if(event.target===this) ui.closeModals()">
    <div class="modal-content">
      <div class="modal-header">
        <span>Магазин подарков</span>
        <span class="stars-balance">Мои звезды: <span id="my-stars-ui">50</span> ★</span>
      </div>
      <div class="gifts-grid" id="gifts-container"></div>
      <button class="btn-primary" onclick="ui.closeModals()">Закрыть</button>
    </div>
  </div>

  <!-- 5. ТАПАЛКА ЛЕХКОИНА -->
  <div id="miner-modal" class="modal" onclick="if(event.target===this) ui.closeModals()">
    <div class="modal-content" style="height: 100%;">
      <div class="modal-header">
        <span>Lehcoin Miner</span>
        <b onclick="ui.closeModals()" style="cursor:pointer">✕</b>
      </div>
      <div style="text-align: center; font-size: 30px; font-weight: bold; margin-top: 20px;">
        Баланс: <span id="lehcoin-balance" style="color: #10b981;">0</span> Ł
      </div>
      <div class="tap-area" id="tap-area">
        <div class="lehcoin" onpointerdown="miner.tap(event)">Ł</div>
      </div>
    </div>
  </div>

  <!-- FIREBASE СКРИПТЫ -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCJY8vOoQDkR2rW_AEG0iddY2sEFhh9OWw",
      authDomain: "telespam-141ed.firebaseapp.com",
      projectId: "telespam-141ed",
      storageBucket: "telespam-141ed.firebasestorage.app",
      messagingSenderId: "207543173024",
      appId: "1:207543173024:web:50881a0f2aa674a7652ec5",
      measurementId: "G-17J19TZ775"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();
    let currentUser = "";

    const state = {
      stars: 50,
      lehcoins: parseInt(localStorage.getItem('lehcoins')) || 0,
      replyTo: null,
      audioCtx: null
    };

    function enterChat() {
      currentUser = document.getElementById("usernameInput").value.trim();
      if (!currentUser) return;
      
      // Если это не "Я", даем баланс 50 звезд из памяти
      if (currentUser !== 'Я') {
        state.stars = parseInt(localStorage.getItem('stars_'+currentUser)) || 50;
      }

      state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if(state.audioCtx.state === 'suspended') state.audioCtx.resume();

      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("chatListScreen").style.display = "flex";
      
      const myRef = db.ref("presence/" + currentUser);
      myRef.set(true);
      myRef.onDisconnect().remove();

      db.ref('messages/main').limitToLast(1).on('value', snap => {
        snap.forEach(child => document.getElementById("main-last-msg").innerText = child.val().content || 'Медиа');
      });

      app.renderGifts();
    }

    const GIFTS = [
      { i:"🧢", n:"Кепка", p:2 }, { i:"🍺", n:"Пиво", p:3 }, { i:"🎄", n:"Ёлка", p:5 },
      { i:"💩", n:"Говно", p:2 }, { i:"🎮", n:"Геймпад", p:10 }, { i:"🚗", n:"Тачка", p:15 },
      { i:"💎", n:"Алмаз", p:20 }, { i:"🚽", n:"Зол. Унитаз", p:30 }, { i:"💰", n:"Мешок", p:12 },
      { i:"🍕", n:"Пицца", p:4 }, { i:"🤡", n:"Нос клоуна", p:3 }, { i:"👑", n:"Корона", p:25 },
      { i:"🦆", n:"Утка", p:5 }, { i:"🍔", n:"Бургер", p:4 }, { i:"🚀", n:"Ракета", p:15 },
      { i:"🎸", n:"Гитара", p:10 }, { i:"💣", n:"Бомба", p:8 }, { i:"📱", n:"Айфон", p:25 },
      { i:"💻", n:"Ноут", p:20 }, { i:"⚽", n:"Мяч", p:3 }, { i:"🥊", n:"Перчатки", p:7 },
      { i:"🕶️", n:"Очки", p:5 }, { i:"🏆", n:"Кубок", p:15 }, { i:"🥩", n:"Стейк", p:6 },
      { i:"🪙", n:"Монетка Ł", p:5 }, { i:"🔥", n:"Огонь", p:2 }, { i:"🍌", n:"Банан", p:2 },
      { i:"💊", n:"Таблетка", p:4 }, { i:"🧠", n:"Мозг", p:10 }, { i:"🔪", n:"Нож", p:8 }
    ];

    const BOT = {
      name: "🤖 Нейрохамам",
      triggers: ["бот", "помоги", "тупой", "че", "как"],
      quotes: [
        "Тебе че надо, мешок с костями?", 
        "Иди уроки делай, гений.", 
        "Отстань, я нейросеть, а не твоя мамочка.",
        "Сам ты тупой 🤡", 
        "Да мне вообще пофиг.", 
        "Ой, всё, отключите меня от этого сервера.",
        "Задонать мне лехкоинов, тогда поговорю.",
        "Чел хорош, но я лучше."
      ],
      check(text, chatId) {
        if (!text) return;
        let txt = text.toLowerCase();
        let isTriggered = this.triggers.some(t => txt.includes(t)) || Math.random() < 0.1;
        if (chatId === 'bot') isTriggered = true;
        
        if (isTriggered) {
          db.ref('typing/' + chatId).set("🤖 Нейрохамам печатает...");
          setTimeout(() => {
            db.ref('typing/' + chatId).remove();
            let reply = this.quotes[Math.floor(Math.random() * this.quotes.length)];
            db.ref('messages/' + chatId).push({ user: this.name, type: "text", content: reply, time: ui.getTime() });
          }, 1500 + Math.random() * 2000);
        }
      }
    };

    const ui = {
      showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); },
      closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); },
      showShop() { 
        document.getElementById('my-stars-ui').innerText = currentUser === 'Я' ? '∞' : state.stars;
        document.getElementById('shop-modal').style.display = 'flex'; 
      },
      showMiner() {
        document.getElementById('lehcoin-balance').innerText = state.lehcoins;
        document.getElementById('miner-modal').style.display = 'flex';
      },
      getTime() { const d = new Date(); return d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0'); },
      playSound(type) {
        if (!state.audioCtx) return;
        const osc = state.audioCtx.createOscillator();
        const gain = state.audioCtx.createGain();
        osc.connect(gain); gain.connect(state.audioCtx.destination);
        if (type === 'send') { osc.frequency.setValueAtTime(400, state.audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(600, state.audioCtx.currentTime + 0.1); }
        else { osc.frequency.setValueAtTime(600, state.audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(400, state.audioCtx.currentTime + 0.1); }
        gain.gain.setValueAtTime(0.1, state.audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, state.audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(state.audioCtx.currentTime + 0.1);
      }
    };

    const app = {
      currentChatId: '',
      openChat(id) {
        this.currentChatId = id;
        document.getElementById("chat-header-title").innerText = id === 'main' ? "Чат с пацанами 🚀" : "🤖 Нейрохамам";
        document.getElementById("messages").innerHTML = "";
        ui.showScreen('chatScreen');
        chat.listen();
      },
      renderGifts() {
        const box = document.getElementById('gifts-container');
        box.innerHTML = GIFTS.map((g, index) => `
          <div class="gift-item" onclick="app.buyGift(${index})">
            <div class="gift-icon">${g.i}</div>
            <div>${g.n}</div>
            <div class="gift-price">${g.p} ★</div>
          </div>
        `).join('');
      },
      buyGift(index) {
        const gift = GIFTS[index];
        if (currentUser !== 'Я' && state.stars < gift.p) return alert("Не хватает звезд!");
        if (currentUser !== 'Я') {
          state.stars -= gift.p;
          localStorage.setItem('stars_'+currentUser, state.stars);
          document.getElementById('my-stars-ui').innerText = state.stars;
        }
        ui.closeModals();
        
        db.ref('messages/main').push({ 
          user: currentUser, 
          type: "gift", 
          content: `${gift.i}<br><b>Подарок: ${gift.n}</b>`, 
          time: ui.getTime() 
        });
      }
    };

    const chat = {
      listener: null,
      typingTimeout: null,
      listen() {
        if(this.listener) db.ref('messages/'+app.currentChatId).off('child_added', this.listener);
        this.listener = db.ref('messages/'+app.currentChatId).limitToLast(50).on('child_added', snap => {
          this.renderMsg(snap.key, snap.val());
          if (snap.val().user !== currentUser) ui.playSound('receive');
        });
        
        db.ref('typing/'+app.currentChatId).on('value', snap => {
          document.getElementById('typing-indicator').innerText = snap.val() || "Онлайн";
        });
      },
      addEmoji(e) { document.getElementById("msg-input").value += e; this.checkInput(); },
      checkInput() {
        const v = document.getElementById("msg-input").value.trim();
        const btn = document.getElementById("mic-btn");
        if(v.length > 0) {
          btn.innerHTML = "➤"; btn.style.background = "#3b82f6";
          btn.onmousedown=null; btn.onmouseup=null; btn.ontouchstart=null; btn.ontouchend=null;
          btn.onclick = () => this.sendText();
          db.ref('typing/'+app.currentChatId).set(currentUser + " печатает...");
          clearTimeout(this.typingTimeout);
          this.typingTimeout = setTimeout(() => db.ref('typing/'+app.currentChatId).remove(), 2000);
        } else {
          btn.innerHTML = media.isVideo ? "🔴" : "🎤"; 
          btn.style.background = media.isVideo ? "#ef4444" : "#3b82f6";
          btn.onclick=null;
          btn.onmousedown = media.startRecord; btn.onmouseup = media.stopRecord; 
          btn.ontouchstart = media.startRecord; btn.ontouchend = media.stopRecord;
        }
      },
      sendText() {
        const inp = document.getElementById("msg-input");
        const txt = inp.value.trim();
        if(!txt) return;
        
        let msgObj = { user: currentUser, type: "text", content: txt, time: ui.getTime() };
        if (state.replyTo) msgObj.reply = state.replyTo;
        
        db.ref('messages/'+app.currentChatId).push(msgObj);
        ui.playSound('send');
        inp.value = ""; this.checkInput(); this.cancelReply();
        db.ref('typing/'+app.currentChatId).remove();
        
        if (currentUser !== BOT.name) BOT.check(txt, app.currentChatId);
      },
      setReply(id, author, content) {
        state.replyTo = { author, content: content.substring(0, 30) + (content.length>30?'...':'') };
        document.getElementById('reply-author').innerText = author;
        document.getElementById('reply-text').innerText = state.replyTo.content;
        document.getElementById('reply-preview').style.display = 'flex';
      },
      cancelReply() { state.replyTo = null; document.getElementById('reply-preview').style.display = 'none'; },
      renderMsg(id, data) {
        const box = document.getElementById("messages");
        const isMy = data.user === currentUser;
        const div = document.createElement("div");
        div.className = "msg " + (isMy ? "my" : "other") + (data.type==='gift'?' gift-msg':'');
        if (data.id) div.id = 'temp-'+data.id;

        let html = "";
        if (data.reply) html += `<div class="reply-block"><b>${data.reply.author}</b><br>${data.reply.content}</div>`;
        
        if (data.type === "text" || data.type === "gift") html += `<div>${data.content.replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/&lt;br&gt;/g,"<br>").replace(/&lt;b&gt;/g,"<b>").replace(/&lt;\/b&gt;/g,"</b>")}</div>`;
        else if (data.type === "image") html += `<img src="${data.content}" onclick="window.open(this.src)">`;
        else if (data.type === "audio") html += `<audio controls src="${data.content}"></audio>`;
        else if (data.type === "video") html += `<video src="${data.content}" onclick="this.paused ? this.play() : this.pause()" loop playsinline></video>`;
        else if (data.type === "file") html += `<div>📎 <a href="${data.content}" target="_blank" style="color:#60a5fa">${data.name || 'Файл'}</a></div>`;

        div.innerHTML = `${!isMy && data.type !== 'gift' ? `<div class="author">${data.user}</div>` : ''}${html}<span class="time">${data.time}</span>`;
        div.onclick = () => { if(data.type === 'text') this.setReply(id, data.user, data.content); };
        
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
      }
    };

    const media = {
      isVideo: false, recorder: null, chunks: [],
      toggleVideoMode() {
        this.isVideo = !this.isVideo;
        chat.checkInput();
      },
      async uploadFile(e) {
        const file = e.target.files[0]; if(!file) return;
        const isImg = file.type.startsWith('image/');
        const tempId = Date.now();
        chat.renderMsg(tempId, { user: currentUser, type: "text", content: "⏳ Загрузка...", time: ui.getTime(), id: tempId });
        try {
          const snap = await storage.ref((isImg?'images/':'files/')+tempId+"_"+file.name).put(file);
          const url = await snap.ref.getDownloadURL();
          document.getElementById('temp-'+tempId)?.remove();
          db.ref('messages/'+app.currentChatId).push({ user: currentUser, type: isImg?"image":"file", content: url, name: file.name, time: ui.getTime() });
          ui.playSound('send');
        } catch(err) { alert("Ошибка загрузки"); }
      },
      async startRecord() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia(this.isVideo ? { video: { width:320, height:320 }, audio: true } : { audio: true });
          this.recorder = new MediaRecorder(stream);
          this.chunks = [];
          this.recorder.start();
          document.getElementById("mic-btn").classList.add("recording");
          this.recorder.ondataavailable = e => this.chunks.push(e.data);
          this.recorder.onstop = async () => {
            stream.getTracks().forEach(t => t.stop());
            const blob = new Blob(this.chunks, { type: this.isVideo ? 'video/webm' : 'audio/webm' });
            const tempId = Date.now();
            chat.renderMsg(tempId, { user: currentUser, type: "text", content: this.isVideo ? "📹 Создание кружка..." : "🎤 Отправка...", time: ui.getTime(), id: tempId });
            try {
              const snap = await storage.ref((this.isVideo?'video_notes/':'audio/')+tempId+".webm").put(blob);
              const url = await snap.ref.getDownloadURL();
              document.getElementById('temp-'+tempId)?.remove();
              db.ref('messages/'+app.currentChatId).push({ user: currentUser, type: this.isVideo?"video":"audio", content: url, time: ui.getTime() });
              ui.playSound('send');
            } catch(e) {}
          };
        } catch(e) { alert("Нет доступа к камере/микрофону"); }
      },
      stopRecord() {
        if(this.recorder && this.recorder.state === "recording") {
          this.recorder.stop();
          document.getElementById("mic-btn").classList.remove("recording");
        }
      }
    };

    const miner = {
      tap(e) {
        state.lehcoins++;
        localStorage.setItem('lehcoins', state.lehcoins);
        document.getElementById('lehcoin-balance').innerText = state.lehcoins;
        
        const floatEl = document.createElement('div');
        floatEl.className = 'floating-text';
        floatEl.innerText = '+1';
        
        const rect = document.getElementById('tap-area').getBoundingClientRect();
        const x = e.clientX - rect.left - 20; 
        const y = e.clientY - rect.top - 20;
        
        floatEl.style.left = `${x}px`;
        floatEl.style.top = `${y}px`;
        document.getElementById('tap-area').appendChild(floatEl);
        
        setTimeout(() => floatEl.remove(), 800);
      }
    };
  </script>
</body>
</html>
